<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DSE Best</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            margin: 0;
            font-size: 2em;
            font-weight: bold;
        }
        
        .logo p {
            color: #666;
            margin: 5px 0 0 0;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input:invalid:not(:focus):not(:placeholder-shown) {
            border-color: #dc3545;
        }
        
        .form-group input:valid:not(:focus):not(:placeholder-shown) {
            border-color: #28a745;
        }
        
        .invalid-feedback {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .invalid-feedback.show {
            display: block;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .loading {
            display: none;
            color: #666;
            margin-top: 10px;
        }
        
        .back-link {
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>DSE Best</h1>
            <p>Admin Dashboard</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required 
                       autocomplete="username" minlength="3" maxlength="50"
                       pattern="[a-zA-Z0-9_-]+" 
                       title="Username must contain only letters, numbers, underscores, and hyphens">
                <div class="invalid-feedback" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required 
                       autocomplete="current-password" minlength="6" maxlength="100">
                <div class="invalid-feedback" id="passwordError"></div>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                Sign In
            </button>
            
            <div id="loading" class="loading">
                Signing in...
            </div>
        </form>
        
        <div class="back-link">
            <a href="/">← Back to DSE Best</a>
        </div>
    </div>

    <script>
        // Check if already authenticated
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/admin/auth', {
                    method: 'GET',
                    credentials: 'include'
                });

                if (response.ok) {
                    // Already authenticated, redirect to dashboard
                    window.location.href = '/admin/';
                }
            } catch (error) {
                // Not authenticated, show login form
                console.log('Not authenticated, showing login form');
            }

            // Set up form validation
            setupFormValidation();
        });

        function setupFormValidation() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            // Real-time validation
            usernameInput.addEventListener('input', validateUsername);
            usernameInput.addEventListener('blur', validateUsername);
            passwordInput.addEventListener('input', validatePassword);
            passwordInput.addEventListener('blur', validatePassword);

            // Form submission
            form.addEventListener('submit', handleFormSubmit);
        }

        function validateUsername() {
            const usernameInput = document.getElementById('username');
            const usernameError = document.getElementById('usernameError');
            const value = usernameInput.value.trim();

            // Clear previous error
            usernameError.classList.remove('show');
            usernameError.textContent = '';

            if (!value) {
                showFieldError('usernameError', 'Username is required');
                return false;
            }

            if (value.length < 3) {
                showFieldError('usernameError', 'Username must be at least 3 characters');
                return false;
            }

            if (value.length > 50) {
                showFieldError('usernameError', 'Username must be less than 50 characters');
                return false;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(value)) {
                showFieldError('usernameError', 'Username can only contain letters, numbers, underscores, and hyphens');
                return false;
            }

            return true;
        }

        function validatePassword() {
            const passwordInput = document.getElementById('password');
            const passwordError = document.getElementById('passwordError');
            const value = passwordInput.value;

            // Clear previous error
            passwordError.classList.remove('show');
            passwordError.textContent = '';

            if (!value) {
                showFieldError('passwordError', 'Password is required');
                return false;
            }

            if (value.length < 6) {
                showFieldError('passwordError', 'Password must be at least 6 characters');
                return false;
            }

            if (value.length > 100) {
                showFieldError('passwordError', 'Password must be less than 100 characters');
                return false;
            }

            return true;
        }

        function showFieldError(errorId, message) {
            const errorElement = document.getElementById(errorId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        function validateForm() {
            const isUsernameValid = validateUsername();
            const isPasswordValid = validatePassword();
            return isUsernameValid && isPasswordValid;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            // Clear any previous general errors
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            // Validate form
            if (!validateForm()) {
                showError('Please fix the errors above');
                return;
            }
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loadingDiv = document.getElementById('loading');
            const loginBtn = document.getElementById('loginBtn');
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing In...';
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            try {
                console.log('Attempting login with username:', username);
                
                const response = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                console.log('Login response:', { status: response.status, data });
                
                if (response.ok) {
                    // Success - redirect to dashboard
                    console.log('Login successful, redirecting...');
                    window.location.href = '/admin/';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please try again.');
            } finally {
                // Reset loading state
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                loadingDiv.style.display = 'none';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Auto-hide after 10 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 10000);
        }
    </script>
</body>
</html>
