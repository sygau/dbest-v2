# Cloudflare Pages Configuration for DSEBest
# This file configures the build and deployment settings

[build]
command = "npm run build:full"
publish = ".next"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "9"

# Environment variables (set these in Cloudflare Pages dashboard)
# CONTENTFUL_SPACE_ID
# CONTENTFUL_ACCESS_TOKEN
# CONTENTFUL_ENVIRONMENT
# CONTENTFUL_PREVIEW_ACCESS_TOKEN

# Build settings
[build.processing]
skip_processing = false

# Asset optimization
[build.processing.images]
bypass_on = "dev"
optimize_png = true
optimize_jpeg = true
optimize_webp = true

# CSS and JS optimization
[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

# HTML optimization
[build.processing.html]
pretty_urls = true

# Functions (if you need serverless functions)
[functions]
directory = "functions"

# Compatibility settings
[compatibility]
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# Routes configuration
[[redirects]]
from = "/:page.html"
to = "/:page"
status = 301

[[redirects]]
from = "/blog/:slug.html"
to = "/blog/:slug"
status = 301

[[redirects]]
from = "/jable"
to = "https://jable.tv/"
status = 301



# Headers configuration
[[headers]]
for = "/*"
[headers.values]
X-DNS-Prefetch-Control = "on"
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
X-XSS-Protection = "1; mode=block"
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

 