<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ably Anonymous Chat</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(to right, #4b6cb7, #182848);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #f44336; /* Red for disconnected */
        }
        .status-dot.connected {
            background-color: #4CAF50; /* Green for connected */
        }
        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .received {
            background-color: #e3f2fd;
            border-bottom-left-radius: 5px;
            align-self: flex-start;
        }
        .sent {
            background-color: #4b6cb7;
            color: white;
            border-bottom-right-radius: 5px;
            align-self: flex-end;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }
        .sender {
            font-weight: 600;
        }
        .timestamp {
            opacity: 0.8;
        }
        .message-content {
            line-height: 1.4;
        }
        .chat-input-area {
            padding: 20px;
            background-color: #f5f5f5;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        .name-input {
            flex: 0 0 150px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .name-input:focus {
            border-color: #4b6cb7;
        }
        .message-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .message-input:focus {
            border-color: #4b6cb7;
        }
        .send-button {
            background: linear-gradient(to right, #4b6cb7, #182848);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .send-button:active {
            transform: translateY(0);
        }
        .system-message {
            text-align: center;
            padding: 10px;
            color: #666;
            font-style: italic;
            font-size: 0.9rem;
        }
        .typing-indicator {
            padding: 10px 20px;
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 15px;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 95vh;
                border-radius: 10px;
            }
            .chat-input-area {
                flex-direction: column;
            }
            .name-input {
                flex: 0 0 auto;
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Anonymous Chat Room</h1>
            <p>Powered by Ably Realtime</p>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text" id="statusText">Connecting...</div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be loaded here -->
        </div>
        <div class="chat-input-area">
            <input type="text" class="name-input" id="userName" placeholder="Your name" maxlength="20">
            <input type="text" class="message-input" id="messageInput" placeholder="Type your message..." maxlength="500">
            <button class="send-button" id="sendButton">Send</button>
        </div>
    </div>
    <script>
        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const userNameInput = document.getElementById('userName');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Generate a random username if none provided
        if (!userNameInput.value) {
            userNameInput.value = 'User' + Math.floor(Math.random() * 1000);
        }

        // Function to add a message to the chat
        function addMessage(sender, message, isOwnMessage, timestamp = null) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.classList.add(isOwnMessage ? 'sent' : 'received');

            // Use provided timestamp or current time
            const msgTime = timestamp ? new Date(timestamp) : new Date();
            const formattedTime = msgTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            messageElement.innerHTML = `
                <div class="message-header">
                    <span class="sender">${sender}</span>
                    <span class="timestamp">${formattedTime}</span>
                </div>
                <div class="message-content">${message}</div>
            `;

            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Function to add system messages
        function addSystemMessage(message) {
            const systemElement = document.createElement('div');
            systemElement.classList.add('system-message');
            systemElement.textContent = message;
            chatMessages.appendChild(systemElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Function to show error messages
        function showErrorMessage(message) {
            // Clear previous messages for critical errors
            if (message.includes("Failed to connect")) {
                chatMessages.innerHTML = '';
            }
            const errorElement = document.createElement('div');
            errorElement.classList.add('error-message');
            errorElement.textContent = message;
            chatMessages.appendChild(errorElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Initialize Ably with a demo key (replace with your own for production)
        // This demo key is specifically for this example
        const ably = new Ably.Realtime.Promise({
            key: 'fOPjAQ.LL-6_A:1QcafkRsuzspOaW3zofjg8Cu_5WjxEjpHUF0syG4uCs', // Demo key
            echoMessages: false
        });

        let channel;

        // Update connection status UI
        function updateConnectionStatus(status) {
            statusText.textContent = status;
            if (status === 'Connected') {
                statusDot.classList.add('connected');
            } else {
                statusDot.classList.remove('connected');
            }
        }

        // Connect to Ably
        ably.connection.on('connected', () => {
            console.log('Connected to Ably');
            updateConnectionStatus('Connected');
            addSystemMessage("Connected to chat server");
        });

        ably.connection.on('failed', (err) => {
            console.error('Ably connection failed:', err);
            updateConnectionStatus('Connection failed');
            showErrorMessage("Failed to connect to chat server. Please refresh the page.");
        });

        ably.connection.on('disconnected', () => {
            console.log('Disconnected from Ably');
            updateConnectionStatus('Disconnected');
            addSystemMessage("Disconnected from chat server");
        });

        // Wait for connection before setting up channel
        ably.connection.once('connected').then(() => {
            // Get the channel
            channel = ably.channels.get('anonymous-chat-room-history');

            // Load last 100 messages
            channel.history({ limit: 100 }, (err, resultPage) => {
                if (err) {
                    console.error('Error fetching history:', err);
                    addSystemMessage("Could not load message history.");
                } else {
                    // History is returned newest first, so reverse for chronological order
                    const messages = resultPage.items.reverse();
                    if (messages.length > 0) {
                        addSystemMessage(`Loaded last ${messages.length} messages:`);
                        messages.forEach(msg => {
                            // Messages from history don't distinguish sender easily without storing it in data
                            // Assuming message format is { sender: ..., text: ... }
                            if (msg.data && typeof msg.data === 'object' && msg.data.sender && msg.data.text) {
                                addMessage(msg.data.sender, msg.data.text, false, msg.timestamp);
                            } else {
                                // Fallback if message format is different
                                addMessage('System', JSON.stringify(msg.data || 'Unknown message'), false, msg.timestamp);
                            }
                        });
                    } else {
                        addSystemMessage("No previous messages found.");
                    }
                }

                // Now subscribe to new messages
                channel.subscribe('message', (message) => {
                    const { sender, text } = message.data;
                    addMessage(sender, text, false);
                });

                addSystemMessage("You can now send messages!");
            });

        }).catch((err) => {
            console.error('Initial connection error:', err);
            updateConnectionStatus('Connection error');
            showErrorMessage("Failed to establish connection. Please check your network.");
        });

        // Send message function
        function sendMessage() {
            if (!channel) {
                showErrorMessage("Not connected to chat server yet. Please wait...");
                return;
            }

            const sender = userNameInput.value.trim() || 'Anonymous';
            const text = messageInput.value.trim();

            if (text) {
                // Publish the message
                channel.publish('message', { sender, text })
                    .then(() => {
                        // Add to own chat (with current timestamp)
                        addMessage(sender, text, true);
                        // Clear input
                        messageInput.value = '';
                    })
                    .catch((err) => {
                        console.error('Publish error:', err);
                        showErrorMessage("Failed to send message. Please try again.");
                    });
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Add initial system messages
        addSystemMessage("Welcome to the anonymous chat room!");
        addSystemMessage("Loading message history...");
    </script>
</body>
</html>
