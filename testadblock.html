    <title>anti jable test</title>
    <!-- Anti-ad-blocker: copy–paste inside <head> or just before </body> -->
<script>
/*  ╔══════════════════════════════════════════════════════════════╗
    ║  Simple Anti-Ad-Blocker – 2025 (public-domain)               ║
    ║  Works on: uBlock Origin, AdGuard, AdBlock Plus, Brave,      ║
    ║            Firefox/Edge built-in blockers, iOS/iPadOS        ║
    ║  How:     ① “Bait” element hidden by cosmetic filters        ║
    ║            ② External ad-script blocked at network layer     ║
    ║            ③ Brave-specific Shields probe (navigator.brave)  ║
    ╚══════════════════════════════════════════════════════════════╝ */
(function () {
  /* ──────────────────── 1. What to do when a blocker is found ─────────────────── */
  function onAdBlockDetected () {
    /* Replace this with whatever UX you prefer (overlay, modal, redirect, etc.) */
    const overlay = document.createElement('div');
    overlay.innerHTML = `
      <div style="
        position:fixed;inset:0;z-index:2147483647;
        background:#ffffffee;display:flex;flex-direction:column;
        align-items:center;justify-content:center;font-family:sans-serif">
        <h2 style="margin:0 0 .5em 0">Please disable your ad-blocker</h2>
        <p style="max-width:28em;text-align:center">
          Ads keep this site free. Kindly whitelist <strong>${location.hostname}</strong>
          and refresh the page.
        </p>
      </div>`;
    document.body.appendChild(overlay);
  }

  /* ───────────── 2. Fast cosmetic-filter check (hidden “bait” div) ─────────────── */
  function cosmeticFilterTriggered () {
    const bait = document.createElement('div');
    bait.className =
      'adsbox pub_728x90 ad-banner adunit adslot adzone sponsored';
    bait.style.cssText =
      'width:1px;height:1px;position:absolute;left:-9999px;top:-9999px;';
    document.body.appendChild(bait);

    const hidden =
      getComputedStyle(bait).display === 'none' ||
      bait.offsetParent === null ||
      bait.offsetHeight === 0 ||
      bait.clientHeight === 0;

    document.body.removeChild(bait);
    return hidden;
  }

  /* ───────────── 3. Network-level check – load a well-known ad script ──────────── */
  function externalScriptBlocked () {
    return new Promise((resolve) => {
      let finished = false;
      function done (blocked) {
        if (!finished) { finished = true; resolve(blocked); }
      }

      const probe = document.createElement('script');
      /* Google Ads script is on every blocker list */
      probe.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js';
      probe.async = true;
      probe.type = 'text/javascript';

      /* If the file is blocked, onerror fires; if allowed, onload fires. */
      probe.onerror = () => done(true);
      probe.onload  = () => done(false);

      /* Extra safety timeout (3 s) in case neither event fires */
      setTimeout(() => done(true), 3000);
      document.head.appendChild(probe);
    });
  }

  /* ───────────── 4. Brave-specific heuristic (Shields still ON) ────────────────── */
  async function braveShieldsActive () {
    try {
      if (navigator.brave && navigator.brave.isBrave) {
        return await navigator.brave.isBrave();
      }
    } catch (_) { /* ignored */ }
    return false;
  }

  /* ───────────────────────────── 5. Master routine ─────────────────────────────── */
  async function detect () {
    /* Trigger tests after full page load to avoid race conditions */
    if (cosmeticFilterTriggered()) { onAdBlockDetected(); return; }

    if (await externalScriptBlocked()) { onAdBlockDetected(); return; }

    if (await braveShieldsActive()) {
      /* Brave sometimes allows the Google probe but still strips your own ads */
      onAdBlockDetected();
    }
  }

  if (document.readyState === 'complete') {
    detect();
  } else {
    window.addEventListener('load', detect, { once: true });
  }
})();
</script>
