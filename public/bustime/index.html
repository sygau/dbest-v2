<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Real-time bus arrivals">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="msapplication-navbutton-color" content="#2d3748">
    <meta name="msapplication-TileColor" content="#2d3748">

    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiByeD0iMjQiIGZpbGw9IiMyZDM3NDgiLz4KPHN2ZyB4PSI0OCIgeT0iNDgiIHdpZHRoPSI5NiIgaGVpZ2h0PSI5NiIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIj4KPHA1aCBkPSJNNCAxNmMwIDEuMTEuODkgMiAyIDJoMTJjMS4xMSAwIDItLjg5IDItMlY4YzAtMS4xMS0uODktMi0yLTJINmMtMS4xMSAwLTIgLjg5LTIgMnY4eiIgZmlsbD0iIzQyOTllMSIvPgo8cGF0aCBkPSJNNiA4aDEydjhoLTEyVjh6IiBmaWxsPSIjZjdmYWZjIi8+CjxjaXJjbGUgY3g9IjgiIGN5PSIxOCIgcj0iMiIgZmlsbD0iIzJkMzc0OCIvPgo8Y2lyY2xlIGN4PSIxNiIgY3k9IjE4IiByPSIyIiBmaWxsPSIjMmQzNzQ4Ii8+CjwvcGF0aD4KPC9zdmc+Cg==">
    
    <title>Bus Time Arrivals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 15px;
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Ensure overscroll matches background */
            background-color: #2d3748;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header h1 {
            color: #f7fafc;
            font-size: 2.2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stop-info {
            color: #a0aec0;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .header-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .refresh-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .refresh-btn:hover {
            background: #3182ce;
            transform: translateY(-1px);
        }

        .refresh-btn:disabled {
            background: #718096;
            cursor: not-allowed;
            transform: none;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-normal { background: #48bb78; color: white; }
        .status-minor_delays { background: #ed8936; color: white; }
        .status-disrupted { background: #f56565; color: white; }
        .status-no_service { background: #a0aec0; color: white; }

        .last-updated {
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .school-filter-section {
            background: rgba(45, 55, 72, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .school-filter {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .alerts {
            margin-bottom: 20px;
        }

        .alert {
            background: rgba(45, 55, 72, 0.9);
            border-left: 4px solid #f56565;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #f7fafc;
        }

        .alert.severity-medium { border-left-color: #ed8936; }
        .alert.severity-high { border-left-color: #f56565; }

        .buses-container {
            display: grid;
            gap: 15px;
        }

        .bus-card {
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .bus-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }

        .bus-fare {
            position: absolute;
            top: -5px;
            right: 0;
            background: rgba(45, 55, 72, 0.9);
            color: #a0aec0;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bus-route {
            background: #4299e1;
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.3rem;
            min-width: 70px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.3);
            transition: all 0.3s ease;
        }

        .bus-route.school-route {
            background: #48bb78;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
            animation: schoolPulse 3s ease-in-out infinite;
        }

        @keyframes schoolPulse {
            0%, 100% { 
                box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 6px 20px rgba(72, 187, 120, 0.6);
                transform: scale(1.05);
            }
        }

        .bus-card.school-route {
            border: 2px solid rgba(72, 187, 120, 0.5);
            background: rgba(72, 187, 120, 0.05);
        }

        .bus-destination {
            flex: 1;
            margin-left: 15px;
            color: #f7fafc;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .bus-card.school-route {
            border: 2px solid rgba(72, 187, 120, 0.5);
            background: rgba(72, 187, 120, 0.05);
        }

        .school-badge {
            display: inline-block;
            background: #48bb78;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .overview-section {
            background: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        .overview-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .overview-title {
            color: #f7fafc;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .school-filter input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #48bb78;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .overview-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(74, 85, 104, 0.4);
            border-radius: 10px;
            border-left: 4px solid #4299e1;
            position: relative;
        }

        .overview-fare {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 0.65rem;
            opacity: 0.7;
            color: #a0aec0;
            font-weight: 400;
        }

        .overview-item.school-route {
            border-left-color: #48bb78;
            background: rgba(72, 187, 120, 0.1);
        }

        .overview-route {
            font-weight: bold;
            color: #f7fafc;
            font-size: 1rem;
        }

        .overview-route.school-route {
            color: #48bb78;
        }

        .overview-time {
            color: #a0aec0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .overview-time.arriving-soon {
            color: #68d391;
            animation: pulse 2s infinite;
        }

        .overview-time.delayed {
            color: #ed8936;
        }

        .unavailable-notice {
            background: rgba(237, 137, 54, 0.1);
            border: 1px solid rgba(237, 137, 54, 0.3);
            color: #ed8936;
            padding: 15px;
            border-radius: 16px;
            margin: 30px 0;
            font-size: 0.9rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .arrivals {
            display: grid;
            gap: 10px;
        }

        .arrival {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(74, 85, 104, 0.4);
            border-radius: 10px;
            border-left: 4px solid transparent;
        }

        .arrival.arriving-soon {
            border-left-color: #48bb78;
            background: rgba(72, 187, 120, 0.1);
        }

        .arrival.delayed {
            border-left-color: #ed8936;
            background: rgba(237, 137, 54, 0.1);
        }

        .arrival-time {
            font-weight: bold;
            color: #f7fafc;
            font-size: 1.1rem;
        }

        .arrival-time.arriving-soon {
            color: #68d391;
            animation: pulse 2s infinite;
        }

        .arrival-time.delayed {
            color: #ed8936;
        }

        .arrival-eta {
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .arrival-remarks {
            color: #a0aec0;
            font-size: 0.85rem;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #f7fafc;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(247, 250, 252, 0.3);
            border-top: 4px solid #f7fafc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .no-buses {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            background: rgba(45, 55, 72, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(45, 55, 72, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #a0aec0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header {
                padding: 20px 15px;
            }

            .header-controls {
                flex-direction: column;
                gap: 10px;
            }

            .bus-card {
                padding: 15px;
            }

            .bus-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .bus-destination {
                margin-left: 0;
                font-size: 1rem;
            }

            .arrival {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .arrival-info {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .refresh-indicator {
                top: 10px;
                right: 10px;
                font-size: 0.7rem;
            }

            .overview-grid {
                grid-template-columns: 1fr;
            }

            .overview-header {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .bus-route {
                font-size: 1.1rem;
                padding: 8px 14px;
                min-width: 60px;
            }

            .bus-card {
                padding: 12px;
            }

            .arrival {
                padding: 10px 12px;
            }

            .arrival-time {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚌 Bus Arrivals</h1>
            <div class="stop-info">Live Bus Arrival Time Tracker</div>
            <div class="header-controls">
                <div id="serviceStatus" class="status-badge status-normal">Normal Service</div>
                <button id="refreshBtn" class="refresh-btn">🔄 Refresh Now</button>
            </div>
            <div class="last-updated">
                Last updated: <span id="lastUpdated">Loading...</span>
            </div>
        </div>

        <div id="overviewSection" class="overview-section" style="display: none;">
            <div class="overview-header">
                <div class="overview-title">📊 Quick Overview</div>
            </div>
            <div id="overviewGrid" class="overview-grid"></div>
        </div>

        <div class="school-filter-section">
            <div class="school-filter">
                <input type="checkbox" id="schoolOnlyFilter">
                <label for="schoolOnlyFilter">🎓 School buses only</label>
            </div>
        </div>

        <div id="alerts" class="alerts"></div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>Loading bus information...</div>
        </div>

        <div id="busesContainer" class="buses-container" style="display: none;"></div>
        
        <div id="noBuses" class="no-buses" style="display: none;">
            <h3>No buses available</h3>
            <p>No bus services found for this stop at the moment.</p>
        </div>

        <div id="unavailableNotice" class="unavailable-notice" style="display: none;"></div>
    </div>

    <div class="refresh-indicator">
        Auto-refresh: <span id="countdown">10</span>s
    </div>

    <script>
        class BusTracker {
            constructor() {
                this.stopId = '001272';
                this.refreshInterval = 10000; // 10 seconds
                this.countdownInterval = null;
                this.countdown = 10;
                
                // Configure your school routes here
                this.schoolRoutes = ['2', '2A', '77', '99', '85', '85A', '8H', '81', '81A', '307P', '678'];
                
                // Fare pricing for each route (in HKD)
                this.routeFares = {
                    '2A': 2.8,
                    '2': 2.8,
                    '77': 4.9,
                    '77A': 4.9,
                    '99': 4.9,
                    '85': 2.6,
                    '85A': 2.6,
                    '81': 2.8,
                    '81A': 2.8,
                    '82': 2.8,
                    '722': 4.4,
                    '18X': 5.4,
                    '19P': 3.3,
                    '302A': 7.2,
                    '33X': 7.3,
                    'A12': 23.8,
                    'N8X': 5.9,
                    'NA12': 30.4,
                    '8H': 3.5,
                    '307P': 3.9,
                    '678': 3.9
                };
                
                // All predefined routes
                this.allRoutes = [
                    // Main/most common priority
                    '2', '2A', '77', '99', '85', '85A', '8H', '81', '81A',
                    // Common for outings/travel
                    '722', '18X', '82',
                    // School routes but rare
                    '307P', '678',
                    // Less frequently used
                    '19P', '302A', '33X', '77A', 'A12', 'N8X', 'NA12'
                ];
                
                // Load school filter preference from localStorage
                this.schoolOnlyMode = localStorage.getItem('schoolOnlyFilter') === 'true';
                
                this.elements = {
                    loading: document.getElementById('loading'),
                    busesContainer: document.getElementById('busesContainer'),
                    noBuses: document.getElementById('noBuses'),
                    alerts: document.getElementById('alerts'),
                    serviceStatus: document.getElementById('serviceStatus'),
                    lastUpdated: document.getElementById('lastUpdated'),
                    countdownEl: document.getElementById('countdown'),
                    refreshBtn: document.getElementById('refreshBtn'),
                    overviewSection: document.getElementById('overviewSection'),
                    overviewGrid: document.getElementById('overviewGrid'),
                    schoolFilter: document.getElementById('schoolOnlyFilter'),
                    unavailableNotice: document.getElementById('unavailableNotice')
                };

                this.init();
            }

            async init() {
                this.setupRefreshButton();
                this.setupSchoolFilter();
                await this.fetchBusData();
                this.startAutoRefresh();
            }

            setupRefreshButton() {
                this.elements.refreshBtn.addEventListener('click', () => {
                    this.manualRefresh();
                });
            }

            setupSchoolFilter() {
                // Set initial state
                this.elements.schoolFilter.checked = this.schoolOnlyMode;
                
                // Add event listener
                this.elements.schoolFilter.addEventListener('change', (e) => {
                    this.schoolOnlyMode = e.target.checked;
                    localStorage.setItem('schoolOnlyFilter', this.schoolOnlyMode.toString());
                    
                    // Re-render with current data if available
                    if (this.lastBusData) {
                        this.renderBusData(this.lastBusData);
                    }
                });
            }

            async manualRefresh() {
                this.elements.refreshBtn.disabled = true;
                this.elements.refreshBtn.textContent = '🔄 Refreshing...';
                
                await this.fetchBusData();
                this.countdown = 10;
                
                setTimeout(() => {
                    this.elements.refreshBtn.disabled = false;
                    this.elements.refreshBtn.textContent = '🔄 Refresh Now';
                }, 1000);
            }

            async fetchBusData() {
                try {
                    const response = await fetch(`https://api.dse.best/bus-checker?stop=${this.stopId}`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        throw new Error(`Expected JSON, got: ${text.substring(0, 100)}...`);
                    }
                    
                    const data = await response.json();
                    this.renderBusData(data);
                    
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError('Unable to load bus data: ' + error.message);
                }
            }

            renderBusData(data) {
                this.lastBusData = data; // Store for filter changes
                this.hideLoading();
                this.updateServiceStatus(data.serviceStatus);
                this.renderAlerts(data.alerts || []);
                this.updateLastUpdated(data.timestamp);

                if (!data.buses || data.buses.length === 0) {
                    this.showNoBuses();
                    return;
                }

                // Check for unavailable routes
                this.checkUnavailableRoutes(data.buses);
                
                // Render overview and detailed sections
                this.renderOverview(data.buses);
                this.renderBuses(data.buses);
            }

            checkUnavailableRoutes(availableBuses) {
                const availableRoutes = availableBuses.map(bus => bus.route);
                const unavailableRoutes = this.allRoutes.filter(route => 
                    !availableRoutes.includes(route)
                );

                if (unavailableRoutes.length > 0) {
                    this.elements.unavailableNotice.style.display = 'block';
                    this.elements.unavailableNotice.innerHTML = `
                        <strong>⚠️ Currently Unavailable:</strong> 
                        Routes ${unavailableRoutes.join(', ')} are not running or have no upcoming arrivals.
                    `;
                } else {
                    this.elements.unavailableNotice.style.display = 'none';
                }
            }

            renderOverview(buses) {
                this.elements.overviewSection.style.display = 'block';
                
                // Filter buses based on school-only mode
                const filteredBuses = this.schoolOnlyMode 
                    ? buses.filter(bus => this.schoolRoutes.includes(bus.route))
                    : buses;

                if (filteredBuses.length === 0 && this.schoolOnlyMode) {
                    this.elements.overviewGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; color: #a0aec0; padding: 20px;">
                            🎓 No school buses currently available
                        </div>
                    `;
                    return;
                }

                // Sort buses: school routes first, then by earliest arrival time
                const sortedBuses = [...filteredBuses].sort((a, b) => {
                    const aIsSchool = this.schoolRoutes.includes(a.route);
                    const bIsSchool = this.schoolRoutes.includes(b.route);
                    
                    if (aIsSchool && !bIsSchool) return -1;
                    if (!aIsSchool && bIsSchool) return 1;
                    
                    const aTime = a.nextBuses?.[0]?.remainingTime || 999;
                    const bTime = b.nextBuses?.[0]?.remainingTime || 999;
                    return aTime - bTime;
                });

                this.elements.overviewGrid.innerHTML = sortedBuses
                    .map(bus => this.createOverviewItem(bus))
                    .join('');
            }

            createOverviewItem(bus) {
                const nextBus = bus.nextBuses?.[0];
                const minutes = nextBus?.remainingTime || 999;
                const isSchoolRoute = this.schoolRoutes.includes(bus.route);
                const isArriving = minutes <= 3;
                const isDelayed = minutes > 15;
                const fare = this.routeFares[bus.route] || 'N/A';

                let timeText = '';
                if (minutes === 999) {
                    timeText = 'No data';
                } else if (minutes === 0) {
                    timeText = 'Arriving';
                } else if (minutes === 1) {
                    timeText = '1 min';
                } else {
                    timeText = `${minutes} mins`;
                }

                const timeClass = isArriving ? 'arriving-soon' : (isDelayed ? 'delayed' : '');

                return `
                    <div class="overview-item ${isSchoolRoute ? 'school-route' : ''}">
                        <div class="overview-route ${isSchoolRoute ? 'school-route' : ''}">${bus.route}</div>
                        <div class="overview-time ${timeClass}">${timeText}</div>
                        <div class="overview-fare">$${fare}</div>
                    </div>
                `;
            }

            renderBuses(buses) {
                // Filter buses based on school-only mode
                const filteredBuses = this.schoolOnlyMode 
                    ? buses.filter(bus => this.schoolRoutes.includes(bus.route))
                    : buses;

                if (filteredBuses.length === 0) {
                    if (this.schoolOnlyMode) {
                        this.elements.busesContainer.style.display = 'none';
                        this.elements.noBuses.style.display = 'block';
                        this.elements.noBuses.innerHTML = `
                            <h3>🎓 No school buses available</h3>
                            <p>No school bus services found at the moment. Try turning off the school filter to see all buses.</p>
                        `;
                    } else {
                        this.showNoBuses();
                    }
                    return;
                }

                this.elements.noBuses.style.display = 'none';
                this.elements.busesContainer.style.display = 'grid';

                // Sort buses: school routes first, then by earliest arrival time
                const sortedBuses = [...filteredBuses].sort((a, b) => {
                    const aIsSchool = this.schoolRoutes.includes(a.route);
                    const bIsSchool = this.schoolRoutes.includes(b.route);
                    
                    // School routes come first
                    if (aIsSchool && !bIsSchool) return -1;
                    if (!aIsSchool && bIsSchool) return 1;
                    
                    // Within same category, sort by arrival time
                    const aTime = a.nextBuses?.[0]?.remainingTime || 999;
                    const bTime = b.nextBuses?.[0]?.remainingTime || 999;
                    return aTime - bTime;
                });

                this.elements.busesContainer.innerHTML = sortedBuses
                    .map(bus => this.createBusCard(bus))
                    .join('');
            }

            createBusCard(bus) {
                const destination = bus.nextBuses?.[0]?.destination || 'Unknown destination';
                const arrivals = (bus.nextBuses || []).slice(0, 3);
                const isSchoolRoute = this.schoolRoutes.includes(bus.route);
                const fare = this.routeFares[bus.route] || 'N/A';

                return `
                    <div class="bus-card ${isSchoolRoute ? 'school-route' : ''}">
                        <div class="bus-header">
                            <div class="bus-route ${isSchoolRoute ? 'school-route' : ''}">${bus.route}</div>
                            <div class="bus-destination">
                                ${destination}
                                ${isSchoolRoute ? '<span class="school-badge">🎓 School</span>' : ''}
                            </div>
                            <div class="bus-fare">$${fare}</div>
                        </div>
                        <div class="arrivals">
                            ${arrivals.map(arrival => this.createArrivalItem(arrival)).join('')}
                        </div>
                    </div>
                `;
            }

            createArrivalItem(arrival) {
                const minutes = arrival.remainingTime;
                const isArriving = minutes <= 3;
                const isDelayed = minutes > 15;
                
                let timeText = '';
                if (minutes === 0) {
                    timeText = 'Arriving';
                } else if (minutes === 1) {
                    timeText = '1 min';
                } else {
                    timeText = `${minutes} mins`;
                }

                const arrivalClass = isArriving ? 'arriving-soon' : (isDelayed ? 'delayed' : '');
                const timeClass = isArriving ? 'arriving-soon' : (isDelayed ? 'delayed' : '');

                return `
                    <div class="arrival ${arrivalClass}">
                        <div class="arrival-time ${timeClass}">${timeText}</div>
                        <div class="arrival-info">
                            <div class="arrival-eta">${this.formatETA(arrival.eta)}</div>
                            ${arrival.remarks && arrival.remarks !== 'On time' ? 
                                `<div class="arrival-remarks">${arrival.remarks}</div>` : ''}
                        </div>
                    </div>
                `;
            }

            formatETA(etaString) {
                try {
                    const eta = new Date(etaString);
                    return eta.toLocaleTimeString('en-HK', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        hour12: false 
                    });
                } catch {
                    return 'Unknown';
                }
            }

            renderAlerts(alerts) {
                if (alerts.length === 0) {
                    this.elements.alerts.innerHTML = '';
                    return;
                }

                this.elements.alerts.innerHTML = alerts
                    .map(alert => `
                        <div class="alert severity-${alert.severity}">
                            <strong>${this.getAlertTitle(alert.type)}</strong>
                            <div>${alert.message}</div>
                        </div>
                    `).join('');
            }

            getAlertTitle(type) {
                const titles = {
                    'no_data': '⚠️ No Data',
                    'widespread_delays': '🚨 Service Disruption',
                    'some_delays': '⏰ Minor Delays'
                };
                return titles[type] || 'ℹ️ Notice';
            }

            updateServiceStatus(status) {
                const statusTexts = {
                    'normal': 'Normal Service',
                    'minor_delays': 'Minor Delays',
                    'disrupted': 'Service Disrupted',
                    'no_service': 'No Service'
                };

                this.elements.serviceStatus.textContent = statusTexts[status] || 'Unknown';
                this.elements.serviceStatus.className = `status-badge status-${status}`;
            }

            updateLastUpdated(timestamp) {
                try {
                    const time = new Date(timestamp);
                    this.elements.lastUpdated.textContent = time.toLocaleTimeString('en-HK', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
                } catch {
                    this.elements.lastUpdated.textContent = 'Unknown';
                }
            }

            hideLoading() {
                this.elements.loading.style.display = 'none';
            }

            showNoBuses() {
                this.elements.busesContainer.style.display = 'none';
                this.elements.noBuses.style.display = 'block';
            }

            showError(message) {
                this.hideLoading();
                this.elements.alerts.innerHTML = `
                    <div class="alert severity-high">
                        <strong>⚠️ Error</strong>
                        <div>${message}</div>
                    </div>
                `;
            }

            startAutoRefresh() {
                // Refresh data every 10 seconds
                setInterval(() => {
                    this.fetchBusData();
                    this.countdown = 10;
                }, this.refreshInterval);

                // Update countdown every second
                this.countdownInterval = setInterval(() => {
                    this.countdown--;
                    this.elements.countdownEl.textContent = this.countdown;
                    
                    if (this.countdown <= 0) {
                        this.countdown = 10;
                    }
                }, 1000);
            }
        }

        // Initialize the bus tracker when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new BusTracker();
            
            // PWA Enhancements - Prevent zoom and improve touch experience
            setupPWAEnhancements();
        });

        function setupPWAEnhancements() {
            // Prevent pinch zoom
            document.addEventListener('touchstart', function(event) {
                if (event.touches.length > 1) {
                    event.preventDefault();
                }
            }, { passive: false });

            // Prevent double-tap zoom
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Prevent keyboard zoom on form inputs
            document.addEventListener('touchstart', function(event) {
                if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                    event.target.style.fontSize = '16px';
                }
            });

            // Disable context menu on long press
            document.addEventListener('contextmenu', function(event) {
                event.preventDefault();
            });

            // Prevent text selection on touch devices
            document.addEventListener('selectstart', function(event) {
                if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
                    event.preventDefault();
                }
            });
        }

        // PWA Installation Support
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install button or banner
            showInstallPromotion();
        });

        function showInstallPromotion() {
            // Create install button if it doesn't exist
            if (!document.getElementById('installBtn')) {
                const installBtn = document.createElement('button');
                installBtn.id = 'installBtn';
                installBtn.innerHTML = '📱 Install App';
                installBtn.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    left: 20px;
                    background: #48bb78;
                    color: white;
                    border: none;
                    padding: 10px 15px;
                    border-radius: 25px;
                    font-weight: 600;
                    cursor: pointer;
                    box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
                    z-index: 1000;
                    font-size: 0.9rem;
                `;
                
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        
                        if (outcome === 'accepted') {
                            console.log('User accepted the install prompt');
                        }
                        
                        deferredPrompt = null;
                        installBtn.remove();
                    }
                });
                
                document.body.appendChild(installBtn);
                
                // Auto-hide after 10 seconds
                setTimeout(() => {
                    if (installBtn.parentNode) {
                        installBtn.remove();
                    }
                }, 10000);
            }
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('/bustime/sw.js', {
                        scope: '/bustime/'
                    });
                    console.log('ServiceWorker registered successfully');
                    
                    // Update service worker if needed
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New content available, show update prompt
                                showUpdatePrompt();
                            }
                        });
                    });
                } catch (error) {
                    console.log('ServiceWorker registration failed:', error);
                }
            });
        }

        function showUpdatePrompt() {
            if (confirm('New version available! Refresh to update?')) {
                window.location.reload();
            }
        }
    </script>
</body>
</html>
