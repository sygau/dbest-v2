<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Chat Mod Key</title>
  <style>
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 28px 32px; width: 100%; max-width: 420px; }
    h2 { margin: 0 0 4px; font-size: 1rem; color: #58a6ff; }
    p { margin: 0 0 18px; font-size: 0.78rem; color: #7d8590; }
    label { display: block; font-size: 0.75rem; color: #7d8590; margin-bottom: 5px; }
    input { width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 8px 10px; font-family: monospace; font-size: 0.9rem; outline: none; }
    input:focus { border-color: #58a6ff; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .save { background: #238636; color: #fff; }
    .clear { background: #da3633; color: #fff; }
    .status { margin-top: 14px; font-size: 0.78rem; min-height: 18px; }
    .ok { color: #3fb950; }
    .err { color: #f85149; }
    .current { margin-top: 16px; padding: 10px; background: #0d1117; border-radius: 6px; font-size: 0.78rem; word-break: break-all; color: #8b949e; }
    .current span { color: #c9d1d9; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Chat Mod Key</h2>
    <p>Sets <code>dsechat_mod_key</code> in localStorage</p>

    <label for="keyInput">Mod Key</label>
    <input type="password" id="keyInput" placeholder="Enter mod key…" autocomplete="off">

    <div class="row">
      <button class="save" onclick="save()">Save</button>
      <button class="clear" onclick="clear()">Clear</button>
    </div>

    <div class="status" id="status"></div>

    <div class="current" id="current"></div>
  </div>

  <script>
    const KEY = 'dsechat_mod_key';

    function showCurrent() {
      const val = localStorage.getItem(KEY);
      document.getElementById('current').innerHTML = val
        ? 'Current: <span>' + '*'.repeat(Math.min(val.length, 6)) + '…</span>'
        : 'No key set.';
    }

    function save() {
      const v = document.getElementById('keyInput').value.trim();
      if (!v) { setStatus('Enter a key first.', false); return; }
      localStorage.setItem(KEY, v);
      document.getElementById('keyInput').value = '';
      setStatus('Saved.', true);
      showCurrent();
    }

    function clear() {
      localStorage.removeItem(KEY);
      document.getElementById('keyInput').value = '';
      setStatus('Cleared.', true);
      showCurrent();
    }

    function setStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
    showCurrent();
  </script>
</body>
</html>
