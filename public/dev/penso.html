<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Essay Grader</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="AI Essay Grader">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #processing {
            display: none;
        }
        #result {
            display: none;
        }
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #messages {
            margin: 10px 0;
            font-style: italic;
            color: #555;
        }
        .shit-message {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .black-part {
            color: black;
        }
        .red-part {
            color: red;
        }
        .score-text {
            font-size: 48px;
            font-weight: bold;
            color: darkred;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Essay Grader</h1>
        <p>Paste your essay below and let our advanced AI grade it!</p>
        <form id="essayForm">
            <textarea id="essay" placeholder="Enter your essay here..." required></textarea>
            <button type="submit">Grade My Essay</button>
        </form>
        <div id="processing">
            <div class="spinner"></div>
            <div id="messages">Initializing AI...</div>
        </div>
        <div id="result">
            <h2>Your Score:</h2>
            <svg id="gauge" width="200" height="120" viewBox="0 0 200 120">
                <!-- Background arc -->
                <path d="M10 110 A100 100 0 0 1 190 110" stroke="#e0e0e0" stroke-width="10" fill="none"/>
                <!-- Needle pointing to left (0) -->
                <line id="needle" x1="100" y1="110" x2="100" y2="10" stroke="red" stroke-width="4" transform="rotate(-90 100 110)"/>
                <!-- Center dot -->
                <circle cx="100" cy="110" r="5" fill="black"/>
                <!-- Labels -->
                <text x="10" y="115" fill="black">0</text>
                <text x="180" y="115" fill="black">100</text>
            </svg>
            <div class="score-text">0/100</div>
            <div class="shit-message"><span class="black-part">Your work is </span><span class="red-part">shit</span></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('essayForm');
        const processing = document.getElementById('processing');
        const result = document.getElementById('result');
        const messages = document.getElementById('messages');

        const randomMessages = [
            "Analyzing grammar and syntax...",
            "Checking for plagiarism...",
            "Evaluating structure and flow...",
            "Assessing vocabulary usage...",
            "Reviewing coherence and cohesion...",
            "Computing originality score...",
            "Running AI deep learning models...",
            "Cross-referencing with academic standards...",
            "Finalizing grade calculation..."
        ];

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('essay').value.trim() === '') return;

            form.style.display = 'none';
            processing.style.display = 'block';

            let messageIndex = 0;
            const messageInterval = setInterval(() => {
                if (messageIndex < randomMessages.length) {
                    messages.textContent = randomMessages[messageIndex];
                    messageIndex++;
                }
            }, 1500); // Change message every 1.5 seconds

            setTimeout(() => {
                clearInterval(messageInterval);
                processing.style.display = 'none';
                result.style.display = 'block';
            }, 15000); // 15 seconds delay
        });
    </script>
</body>
</html>
