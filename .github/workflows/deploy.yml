name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        default: 'sanity-publish'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_READ_TOKEN: ${{ secrets.NEXT_PUBLIC_SANITY_READ_TOKEN }}
      NEXT_PUBLIC_TURNSTILE_SITEKEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITEKEY }}
      NEXT_PUBLIC_CHAT_WS_URL : ${{ secrets.NEXT_PUBLIC_CHAT_WS_URL }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for Sharp SVG support
        run: sudo apt-get update && sudo apt-get install -y librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restore build cache (blog snapshot, OG images, data)
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            data
            public/og
            .og-cache.json
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Restore git-tracked source files overwritten by cache
        run: git checkout -- data/

      - run: npm ci

      - name: Prep build artifacts (blog data, OG images, sitemap)
        run: npm run build:prep
        continue-on-error: false

      - name: Display OG generation errors (if any)
        if: hashFiles('.og-errors.json') != ''
        run: |
          echo "::error::OG Image Generation Errors:"
          cat .og-errors.json

      - name: Build worker bundle
        run: |
          echo "PROJECT_ID is: $NEXT_PUBLIC_SANITY_PROJECT_ID"
          npm run build:worker

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Deploy (preview)
        if: github.ref != 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --env preview
