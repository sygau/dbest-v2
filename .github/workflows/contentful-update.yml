name: Contentful Content Update

on:
  repository_dispatch:
    types: [contentful_update]
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Give write permission to repository contents
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate blog content from Contentful
        run: node contentful/contentful.js
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blog/ contentful/blogIndex.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update blog content from Contentful [skip ci]" && git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}) 