name: Contentful Content Update

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 5:00 PM Hong Kong time (UTC+8)
  repository_dispatch:
    types: [contentful_update]
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Give write permission to repository contents
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate blog content from Contentful
        id: generate-content
        run: |
          # Run the script and capture its exit code
          node contentful/contentful.js
          # Store the exit code
          echo "SCRIPT_EXIT_CODE=$?" >> $GITHUB_ENV
          # If the script failed, fail this step
          if [ $? -ne 0 ]; then
            echo "::error::Failed to generate content from Contentful. Check the logs for details."
            exit 1
          fi
      
      - name: Commit and push changes
        if: env.SCRIPT_EXIT_CODE == 0
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blog/ contentful/blogIndex.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update blog content from Contentful [skip ci]" && git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}) 